spring:
  profiles:
    active: local # 기본값은 로컬 설정으로 시작

---
# 1. 로컬 개발 환경 (Docker Compose용)
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: order-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

---
# 2. 클라우드 배포 환경 (Render + Supabase용)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # Render/Supabase의 환경변수에서 주입받도록 설정 (보안 유지)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  kafka:
    # Confluent Cloud나 Upstash 같은 외부 카프카 연결 시 설정
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_API_KEY}' password='${KAFKA_API_SECRET}';
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

---
# 공통 설정 (MyBatis & Logging)
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.msr.order.model
  configuration:
    map-underscore-to-camel-case: true # order_id -> orderId 자동 매핑

logging:
  level:
    com.msr.order: debug
    org.springframework.kafka: info