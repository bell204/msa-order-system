services:
  db:
    image: postgres:15
    container_name: order-db
    restart: always
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  # 2. 메시지 관리: Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  # 3. 메시지 브로커: Kafka
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # 내부 컨테이너끼리는 'kafka:29092'로, 외부(내 PC)에서는 'localhost:9092'로 접속 가능하게 설정
      KAFKA_ADVERTISED_LISTENERS: LISTENER_DOCKER_INTERNAL://kafka:29092,LISTENER_DOCKER_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_DOCKER_INTERNAL:PLAINTEXT,LISTENER_DOCKER_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_DOCKER_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- 애플리케이션 영역 ---
  order-service:
    build:
      context: .
      dockerfile: ./order-service/Dockerfile # Dockerfile 위치 지정
    container_name: order-service
    ports:
      - "8080:8080"
    depends_on:
      - db
      - kafka
    environment:
      # 중요: 도커 네트워크 안에서는 서비스 이름(db, kafka)으로 접속해야 함
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/order_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  worker-service:
    build:
      context: .
      dockerfile: ./worker-service/Dockerfile
    container_name: worker-service
    ports:
      - "8081:8081"
    depends_on:
      - db
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/order_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  # 4. (선택) Kafka UI: 웹에서 메시지를 눈으로 확인
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092